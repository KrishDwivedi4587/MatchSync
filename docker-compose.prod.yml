# ---------------------------------------------------------------------------
# Production overrides. Apply on top of the base file:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Differences vs development:
# - No source bind-mounts (images are immutable artifacts).
# - No --reload; the API runs under multiple uvicorn workers.
# - Debug docs disabled via ENVIRONMENT=production (see backend config).
# - Secrets come from the environment / secrets manager, never a committed file.
# ---------------------------------------------------------------------------

services:
  # The one-shot migration job keeps its baked-in image code (no bind mount)
  # and production configuration. It exits after `alembic upgrade head`; the
  # api/workers gate on its completion exactly as in the base file.
  migrate:
    volumes: []
    environment:
      ENVIRONMENT: production
      LOG_FORMAT: json

  api:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    volumes: []
    environment:
      ENVIRONMENT: production
      DEBUG: "false"
      LOG_FORMAT: json
    restart: unless-stopped

  # No `command:` override: the base file's command already carries the queue
  # assignment (-Q sync.high,sync.default). A previous override restated the
  # command WITHOUT -Q, which silently left the sync.high queue (manual syncs)
  # with no consumer in production.
  worker:
    volumes: []
    environment:
      ENVIRONMENT: production
      LOG_FORMAT: json
    restart: unless-stopped

  # The ingest/maintenance worker was previously missing from this file
  # entirely, so production ran it with a dev bind-mount and no restart policy.
  worker-maintenance:
    volumes: []
    environment:
      ENVIRONMENT: production
      LOG_FORMAT: json
    restart: unless-stopped

  beat:
    command: celery -A app.worker.celery_app beat --loglevel=INFO
    volumes: []
    environment:
      ENVIRONMENT: production
      LOG_FORMAT: json
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      # The base file targets the "deps" stage for the dev toolchain; production
      # must build the full multi-stage image whose final stage is the
      # standalone runner that `node server.js` expects.
      target: runner
    command: node server.js
    volumes: []
    environment:
      NODE_ENV: production
    restart: unless-stopped

  postgres:
    restart: unless-stopped

  redis:
    restart: unless-stopped
