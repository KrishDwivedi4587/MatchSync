name: Docker Build

# Verifies both service images build. Does NOT push in this stage — a registry
# push + deploy job is added in the deployment stage (image tags, environments).
on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: backend
            context: ./backend
          - name: frontend
            context: ./frontend
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.name }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: false
          load: true
          tags: matchsync-${{ matrix.name }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
